{% extends "base.html" %}{% block content %}<h1 class="page-title">Nhập kết quả</h1><p class="page-subtitle">Người thua đăng nhập và nhập tỉ số</p><div class="panel"><form method="post" class="grid-form"><label>Trận đang đá<select name="match_id" required>{% for m in matches %}<option value="{{ m.id }}">{{ m.player1_name }} ({{ m.team1 }}) vs {{ m.player2_name }} ({{ m.team2 }})</option>{% endfor %}</select></label><div class="two-col"><label>Tỉ số Player 1<input type="number" min="0" name="score1" required></label><label>Tỉ số Player 2<input type="number" min="0" name="score2" required></label></div><button class="btn green" type="submit">Gửi kết quả</button></form></div>{% endblock %}
