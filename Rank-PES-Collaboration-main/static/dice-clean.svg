<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Xúc xắc quay random đội</title>
  <desc id="desc">Biểu tượng một viên xúc xắc màu trắng trên nền trong suốt</desc>
  <defs>
    <linearGradient id="body" x1="28" y1="20" x2="132" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#e9edf3"/>
      <stop offset="1" stop-color="#cbd3df"/>
    </linearGradient>
    <linearGradient id="edge" x1="38" y1="25" x2="122" y2="135" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff4bd"/>
      <stop offset="0.45" stop-color="#e7b83e"/>
      <stop offset="1" stop-color="#9f6d11"/>
    </linearGradient>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect x="24" y="24" width="112" height="112" rx="25" fill="url(#body)" stroke="url(#edge)" stroke-width="4" transform="rotate(-8 80 80)"/>
    <g fill="#101722">
      <circle cx="52" cy="51" r="8"/>
      <circle cx="107" cy="48" r="8"/>
      <circle cx="79" cy="79" r="8"/>
      <circle cx="50" cy="108" r="8"/>
      <circle cx="105" cy="106" r="8"/>
    </g>
    <path d="M120 37c8 5 14 12 18 20" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.72"/>
  </g>
</svg>
